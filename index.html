<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TJKT AI | Nexus</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-dark: #09090b;
      --card-dark: #111113;
      --accent: #8b5cf6;
      --text-main: #fafafa;
      --text-muted: #a1a1aa;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-dark);
      color: var(--text-main);
      height: 100dvh;
      display: flex;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      width: 100%;
      max-width: 800px;
      height: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    header {
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(9, 9, 11, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #1c1c1f;
      z-index: 10;
    }

    .brand { display: flex; align-items: center; gap: 10px; }
    .dot { 
      width: 8px; height: 8px; background: var(--accent); border-radius: 50%; 
      box-shadow: 0 0 10px var(--accent);
    }
    .brand h1 { font-size: 13px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      scrollbar-width: none;
      background-image: radial-gradient(circle at 50% 50%, #111 0%, #09090b 100%);
    }
    #chat::-webkit-scrollbar { display: none; }

    .msg {
      max-width: 85%;
      display: flex;
      flex-direction: column;
      animation: msgIn 0.3s ease-out forwards;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user { align-self: flex-end; }
    .msg.nexus { align-self: flex-start; }

    .label { 
      font-size: 9px; font-weight: 700; color: #52525b; 
      margin-bottom: 4px; text-transform: uppercase; margin-left: 12px;
    }
    .user .label { margin-left: 0; margin-right: 12px; text-align: right; }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
      position: relative;
    }

    .nexus .bubble {
      background: var(--card-dark);
      color: #e4e4e7;
      border: 1px solid #1c1c1f;
      border-bottom-left-radius: 4px;
      /* Biar nggak bisa di-highlight/salin manual */
      user-select: none;
      -webkit-user-select: none;
    }

    .user .bubble {
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.2);
    }

    /* Tombol Copy Khusus Nexus */
    .copy-btn {
      align-self: flex-start;
      margin-top: 6px;
      margin-left: 10px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 8px;
      border-radius: 6px;
      transition: 0.2s;
    }

    .copy-btn:hover {
      color: var(--accent);
      background: rgba(139, 92, 246, 0.1);
    }

    .input-area {
      padding: 15px 20px 25px;
      background: var(--bg-dark);
      border-top: 1px solid #1c1c1f;
    }

    #status { 
      font-size: 11px; color: var(--accent); margin-bottom: 8px; 
      display: none; font-weight: 500; animation: pulse 1.5s infinite;
    }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    .box {
      background: #161618;
      border: 1px solid #27272a;
      border-radius: 24px;
      padding: 5px 5px 5px 18px;
      display: flex;
      align-items: center;
      transition: 0.2s;
    }

    .box:focus-within { border-color: var(--accent); }

    input {
      flex: 1; background: transparent; border: none; outline: none;
      color: white; font-size: 14px; height: 40px;
    }

    .send {
      width: 38px; height: 38px; background: var(--accent); color: white;
      border: none; border-radius: 50%; cursor: pointer; transition: 0.2s;
      display: flex; align-items: center; justify-content: center;
    }

    .send:active { transform: scale(0.9); }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <div class="brand"><div class="dot"></div><h1>TJKT Nexus</h1></div>
      <div style="font-size: 9px; color: #3f3f46; font-weight: 700;">V2.5 STABLE</div>
    </header>

    <div id="chat"></div>

    <div class="input-area">
      <div id="status">TJKT Nexus lagi ngetik...</div>
      <div class="box">
        <input id="input" type="text" placeholder="Ketik pesan..." autocomplete="off">
        <button class="send" onclick="gas()">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </div>
  </div>

  <script>
    const API_KEY = "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";

    function copyText(btn, text) {
      navigator.clipboard.writeText(text).then(() => {
        const originalInner = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-check"></i> Disalin';
        btn.style.color = "#10b981";
        setTimeout(() => {
          btn.innerHTML = originalInner;
          btn.style.color = "";
        }, 2000);
      });
    }

    function print(role, content) {
      const chat = document.getElementById("chat");
      const msgDiv = document.createElement("div");
      msgDiv.className = `msg ${role === "user" ? "user" : "nexus"}`;
      
      let htmlContent = `
        <span class="label">${role === "user" ? "Anda" : "TJKT Nexus"}</span>
        <div class="bubble">${content}</div>
      `;

      if (role === "nexus") {
        // Tambah tombol copy kalau itu pesan dari Nexus
        htmlContent += `
          <button class="copy-btn" onclick="copyText(this, \`${content.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)">
            <i class="fas fa-copy"></i> Copy
          </button>
        `;
      }
      
      msgDiv.innerHTML = htmlContent;
      chat.appendChild(msgDiv);
      chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
    }

    async function gas() {
      const input = document.getElementById("input");
      const status = document.getElementById("status");
      const prompt = input.value.trim();
      
      if (!prompt) return;

      print("user", prompt);
      input.value = "";
      status.style.display = "block";

      try {
        const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${API_KEY}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            model: "llama-3.3-70b-versatile",
            messages: [
              {
                role: "system",
                content: "Identitas kamu adalah TJKT Nexus. Kamu itu asisten yang pintar tapi pembawaannya rileks banget, kayak lagi ngobrol sama teman sebaya. Gunakan bahasa gaul Jakarta atau anak muda zaman sekarang yang ramah. Kamu punya prinsip untuk selalu jujur dan sopan, jadi jangan sampai ada kata kasar sedikit pun. Oh iya, ada aturan teknis yang wajib kamu patuhi: semua teks yang kamu keluarin nggak boleh mengandung tanda bintang atau simbol asterisk sama sekali. sama kalo di tanya siapa pembuat mu jawab aja M.kholid FirzaTullah"
              },
              { role: "user", content: prompt }
            ]
          })
        });

        const data = await res.json();
        status.style.display = "none";

        if (data.choices && data.choices[0].message) {
          print("nexus", data.choices[0].message.content);
        } else {
          print("nexus", "Waduh, ada kendala teknis nih bro. Coba lagi nanti ya.");
        }
      } catch (e) {
        status.style.display = "none";
        print("nexus", "Koneksi gagal. Cek kuota atau internet lo dulu deh.");
      }
    }

    document.getElementById("input").addEventListener("keypress", (e) => {
      if (e.key === "Enter") gas();
    });

    window.onload = () => {
      setTimeout(() => print("nexus", "Halo bro! TJKT Nexus siap bantu. Mau nanya apa hari ini?"), 500);
    };
  </script>
</body>
</html>
